name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    env:
      S3_BLOG_PATH: ${{ vars.S3_BLOG_PATH || '/blog' }}
      NEXT_PUBLIC_GA_ID: ${{ vars.NEXT_PUBLIC_GA_ID }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.2

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run lint
        run: pnpm lint

      - name: Run audit
        run: pnpm audit --audit-level moderate

      - name: Validate content Worker bundle
        run: pnpm exec wrangler deploy --config cloudflare/content-source.wrangler.toml --dry-run --outdir "$RUNNER_TEMP/content-worker-dry-run"

      - name: Prepare mock public S3
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p "$RUNNER_TEMP/public-s3/blog/posts"
          cat > "$RUNNER_TEMP/public-s3/blog/posts/index.json" <<'JSON'
          ["ci-smoke.md"]
          JSON
          cat > "$RUNNER_TEMP/public-s3/blog/posts/ci-smoke.md" <<'MD'
          ---
          title: "CI Smoke Post"
          date: "2026-04-29"
          tags:
            - ci
          ---

          # CI Smoke Post

          This post verifies static export against a public-S3-compatible source.
          MD
          python3 -m http.server 8787 --directory "$RUNNER_TEMP/public-s3" &
          for attempt in {1..10}; do
            if curl -fsSL http://127.0.0.1:8787/blog/posts/index.json >/dev/null; then
              exit 0
            fi
            sleep 1
          done
          echo "Mock public S3 server did not become ready." >&2
          exit 1

      - name: Build static export
        env:
          S3_PUBLIC_ENDPOINT: http://127.0.0.1:8787
          S3_BLOG_PATH: ${{ env.S3_BLOG_PATH }}
        run: pnpm build
